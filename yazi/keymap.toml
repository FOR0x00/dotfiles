"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]
prepend_keymap = [
  { on = "l", run = "plugin smart-enter", desc = "Enter the child directory, or open the file" },
  { on = "K", run = "arrow -5", desc = "Move cursor up 5 rows" },
  { on = "J", run = "arrow 5", desc = "Move cursor down 5 rows" },
	{ on = [ "g", "D" ],       run = "cd ~/Documents",   desc = "Go ~/Documents" },
  { on = [ "g", "r" ], run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"', desc = "Go to repository root" },
  { on = "<C-d>", run  = "plugin diff", desc = "Diff the selected with the hovered file" },
]
append_keymap = [
  { on = "<C-k>", run = "seek -5", desc = "Seek up 5 units in the preview" },
  { on = "<C-j>", run = "seek 5", desc = "Seek down 5 units in the preview" },
  { on = "<C-/>", run = "shell '$SHELL' --block --confirm", desc = "Open terminal in current directory" },
  { on = "A", run = "create --dir", desc = "Create a directory" },
  { on = "<C-g>", run = "shell --confirm --block lazygit", desc = "Lazygit" },
]

[help]
prepend_keymap = [
  { on = "K", run = "arrow -5", desc = "Move cursor up 5 rows" },
  { on = "J", run = "arrow 5", desc = "Move cursor down 5 rows" },
]

